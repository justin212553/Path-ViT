General:
    comment:
    seed: 2021
    fp16: True
    amp_level: O2
    precision: 16
    multi_gpu_mode: dp
    gpus: [0]
    epochs: &epoch 50
    grad_acc: 1
    frozen_bn: False
    patience: 10
    server: train #train #test
    log_path: logs/

Data:
    dataset_name: path_vit_data
    data_shuffle: False
    patches_root: data/patches          # Path-ViT 루트 기준 상대경로 (config.DataConfig와 동일)
    csv_path: data/stage_labels.csv
    feat_dim: 1024                       # TransMIL._fc1 입력 차원과 맞춰야 함
    chunk_size: 64                       # CNN 인코딩 시 한 번에 GPU에 올리는 패치 수
    fold: 0
    nfold: 1

    # CNN 인코딩을 __getitem__ 내부에서 GPU로 수행하므로 0이어야 함
    # (CUDA 초기화 후 fork되는 worker 프로세스에서 오류 발생)
    train_dataloader:
        batch_size: 1
        num_workers: 0

    test_dataloader:
        batch_size: 1
        num_workers: 0

Model:
    name: TransMIL
    n_classes: 2


Optimizer:
    opt: lookahead_radam
    lr: 0.0002
    opt_eps: null
    opt_betas: null
    momentum: null
    weight_decay: 0.00001

Loss:
    base_loss: CrossEntropyLoss
